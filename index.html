                <p class="hint">一般名でも商品名でも可</p>
            </div>
            
            <div class="form-group">
                <label for="patientType">患者タイプ</label>
                <select id="patientType">
                    <option value="general">一般成人</option>
                    <option value="elderly">高齢者（65歳以上）</option>
                    <option value="young">若年層（20-40代）</option>
                    <option value="caregiver">介護者・家族向け</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="explanationDepth">説明の詳しさ</label>
                <select id="explanationDepth">
                    <option value="simple">シンプル（1分程度）</option>
                    <option value="standard" selected>標準（2-3分）</option>
                    <option value="detailed">詳細（5分以上）</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>説明に含める項目</label>
                <div class="checkbox-group">
                    <div class="checkbox-item">
                        <input type="checkbox" id="incEffect" checked>
                        <label for="incEffect">効果・効能</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="incTiming" checked>
                        <label for="incTiming">飲み方・タイミング</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="incSideEffect" checked>
                        <label for="incSideEffect">注意する副作用</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="incCaution">
                        <label for="incCaution">併用注意</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="incLifestyle">
                        <label for="incLifestyle">生活上の注意</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="incStorage">
                        <label for="incStorage">保管方法</label>
                    </div>
                </div>
            </div>
            
            <div class="form-group">
                <label for="additionalNote">追加で説明したいこと（任意）</label>
                <textarea id="additionalNote" placeholder="例: 飲み忘れ時の対応、特定の懸念事項など"></textarea>
            </div>
            
            <button class="btn" onclick="generateExplanation()">説明文を生成</button>
        </div>
        
        <div class="card result-section" id="resultSection">
            <div class="result-header">
                <span class="result-title">📄 生成された説明文</span>
                <button class="copy-btn" onclick="copyResult()">📋 コピー</button>
            </div>
            <div class="result-content" id="resultContent"></div>
        </div>
        
        <!-- CTAセクション -->

        function generateExplanation() {
            const drugName = document.getElementById('drugName').value.trim();
            const patientType = document.getElementById('patientType').value;
            const explanationDepth = document.getElementById('explanationDepth').value;
            const additionalNote = document.getElementById('additionalNote').value.trim();
            
            // チェックボックスの状態
            const incEffect = document.getElementById('incEffect').checked;
            const incTiming = document.getElementById('incTiming').checked;
            const incSideEffect = document.getElementById('incSideEffect').checked;
            const incCaution = document.getElementById('incCaution').checked;
            const incLifestyle = document.getElementById('incLifestyle').checked;
            const incStorage = document.getElementById('incStorage').checked;
            
            if (!drugName) {
                alert('薬剤名を入力してください');
                return;
            }
            
            // 薬剤データを検索
            let drugInfo = drugDatabase[drugName];
            
            // 見つからない場合は部分一致で検索
            if (!drugInfo) {
                for (const key in drugDatabase) {
                    if (drugName.includes(key) || key.includes(drugName)) {
                        drugInfo = drugDatabase[key];
                        break;
                    }
                }
            }
            
            let explanation = '';
            
            if (drugInfo) {
                // 登録されている薬剤の場合
                explanation = generateRegisteredDrugExplanation(drugName, drugInfo, patientType, explanationDepth, {
                    incEffect, incTiming, incSideEffect, incCaution, incLifestyle, incStorage
                }, additionalNote);
            } else {
                // 登録されていない薬剤の場合
                explanation = generateGenericExplanation(drugName, patientType, explanationDepth, {
                    incEffect, incTiming, incSideEffect, incCaution, incLifestyle, incStorage
                }, additionalNote);
            }
            
            document.getElementById('resultContent').innerHTML = explanation;
            document.getElementById('resultSection').classList.add('show');
            document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth' });
        }
        
        function generateRegisteredDrugExplanation(drugName, drugInfo, patientType, depth, options, additionalNote) {
            let explanation = '';
            
            // 患者タイプ別の挨拶
            const greetings = {
                general: `【${drugName}の説明】\n\nこのお薬は「${drugInfo.category}」という種類のお薬です。`,
                elderly: `【${drugName}の説明】\n\nこのお薬は「${drugInfo.category}」です。\n分かりやすく説明しますね。`,
                young: `【${drugName}の説明】\n\nこのお薬は「${drugInfo.category}」という種類です。`,
                caregiver: `【${drugName}の説明】\n\nこのお薬は「${drugInfo.category}」です。ご本人の管理にお役立てください。`
            };
            
            explanation += greetings[patientType] + '\n\n';
            
            // 効果・効能
            if (options.incEffect) {
                explanation += `■このお薬の効果\n${drugInfo.effect}\n\n`;
            }
            
            // 飲み方・タイミング
            if (options.incTiming) {
                explanation += `■飲み方\n${drugInfo.timing}\n`;
                if (patientType === 'elderly') {
                    explanation += '飲み忘れた場合は、気づいた時に1回分を飲んでください。ただし、次の時間が近い場合は飛ばしてください。\n';
                }
                explanation += '\n';
            }
            
            // 副作用
            if (options.incSideEffect) {
                explanation += '■注意する副作用\n';
                drugInfo.sideEffects.forEach(effect => {
                    explanation += `・${effect}\n`;
                });
                if (patientType === 'elderly') {
                    explanation += '\nこれらの症状が出たら、我慢せずに相談してください。\n';
                }
                explanation += '\n';
            }
            
            // 併用注意
            if (options.incCaution && drugInfo.cautions) {
                explanation += '■一緒に気をつけること\n';
                drugInfo.cautions.forEach(caution => {
                    explanation += `・${caution}\n`;
                });
                explanation += '\n';
            }
            
            // 生活上の注意
            if (options.incLifestyle && drugInfo.lifestyle) {
                explanation += '■日常生活で気をつけること\n';
                drugInfo.lifestyle.forEach(tip => {
                    explanation += `・${tip}\n`;
                });
                explanation += '\n';
            }
            
            // 保管方法
            if (options.incStorage) {
                explanation += `■保管方法\n${drugInfo.storage}\n`;
                if (patientType === 'elderly' || patientType === 'caregiver') {
                    explanation += '湿気や直射日光を避けて、子供の手の届かない場所に保管してください。\n';
                }
                explanation += '\n';
            }
            
            // 追加説明
            if (additionalNote) {
                explanation += `■その他\n${additionalNote}\n\n`;
            }
            
            // 詳細度に応じた追加情報
            if (depth === 'detailed') {
                explanation += generateDetailedInfo(drugInfo, patientType);
            }
            
            // 飲み忘れ時の対応
            if (options.incTiming) {
                explanation += '■飲み忘れた場合\n';
                if (patientType === 'elderly') {
                    explanation += '気づいた時に1回分飲んでください。ただし、次の時間が近い場合は1回分飛ばしてください。2回分を一度に飲まないでください。\n\n';
                } else {
                    explanation += '気づいた時に1回分飲んでください。次の服用時間が近い場合は1回分飛ばしてください。2回分を一度に飲まないでください。\n\n';
                }
            }
            
            // まとめ
            if (patientType === 'elderly') {
                explanation += '何か心配なことがあれば、いつでもご相談くださいね。';
            } else if (patientType === 'caregiver') {
                explanation += 'ご不明な点があれば、お気軽にご相談ください。';
            } else {
                explanation += 'ご不明な点があれば、いつでもご相談ください。';
            }
            
            return explanation;
        }
        
        function generateGenericExplanation(drugName, patientType, depth, options, additionalNote) {
            let explanation = '';
            
            // 患者タイプ別の挨拶
            const greetings = {
                general: `【${drugName}の説明】\n\nこのお薬について説明します。`,
                elderly: `【${drugName}の説明】\n\nこのお薬について、分かりやすく説明しますね。`,
                young: `【${drugName}の説明】\n\nこのお薬について説明します。`,
                caregiver: `【${drugName}の説明】\n\nこのお薬について説明します。ご本人の管理にお役立てください。`
            };
            
            explanation += greetings[patientType] + '\n\n';
            
            // 効果・効能
            if (options.incEffect) {
                explanation += `■このお薬の効果\nこのお薬は、医師が${patientType === 'elderly' ? 'あなたの症状に合わせて' : 'あなたの症状に合わせて'}処方したものです。効果や効能について、詳しくは医師や薬剤師にお尋ねください。\n\n`;
            }
            
            // 飲み方・タイミング
            if (options.incTiming) {
                explanation += '■飲み方\n';
                if (patientType === 'elderly') {
                    explanation += '決められた時間に、決められた量を飲んでください。\n飲み忘れた場合は、気づいた時に1回分を飲んでください。ただし、次の時間が近い場合は飛ばしてください。\n\n';
                } else {
                    explanation += '決められた時間に、決められた量を飲んでください。\n飲み忘れた場合は、気づいた時に1回分を飲んでください。次の時間が近い場合は1回分飛ばしてください。\n\n';
                }
            }
            
            // 副作用
            if (options.incSideEffect) {
                explanation += '■注意する副作用\n';
                if (patientType === 'elderly') {
                    explanation += '・体に変調を感じたら、我慢せずに相談してください\n';
                    explanation += '・特に、発疹、むくみ、強いだるさなどがあればすぐに相談してください\n\n';
                } else {
                    explanation += '・発疹、かゆみなどのアレルギー症状\n';
                    explanation += '・強い胃の不快感\n';
                    explanation += '・体に変調を感じたら、すぐに相談してください\n\n';
                }
            }
            
            // 併用注意
            if (options.incCaution) {
                explanation += '■一緒に気をつけること\n';
                explanation += '・他のお薬やサプリメントを飲んでいる場合は、相談してください\n';
                if (patientType === 'elderly') {
                    explanation += '・市販薬を買う時は、薬局でこのお薬を飲んでいることを伝えてください\n';
                }
                explanation += '\n';
            }
            
            // 生活上の注意
            if (options.incLifestyle) {
                explanation += '■日常生活で気をつけること\n';
                if (patientType === 'elderly') {
                    explanation += '・お酒は控えめにしてください\n';
                    explanation += '・体調に変化があれば、記録しておくと良いです\n';
                } else {
                    explanation += '・お酒は控えめにしてください\n';
                    explanation += '・規則正しい生活を心がけてください\n';
                }
                explanation += '\n';
            }
            
            // 保管方法
            if (options.incStorage) {
                explanation += '■保管方法\n';
                if (patientType === 'elderly' || patientType === 'caregiver') {
                    explanation += '湿気や直射日光を避けて、子供の手の届かない場所に保管してください。\n';
                    explanation += 'お風呂場や窓辺は避けてください。\n\n';
                } else {
                    explanation += '室温で、湿気と直射日光を避けて保管してください。\n\n';
                }
            }
            
            // 追加説明
            if (additionalNote) {
                explanation += `■その他\n${additionalNote}\n\n`;
            }
            
            // まとめ
            if (patientType === 'elderly') {
                explanation += '何か心配なことがあれば、いつでもご相談くださいね。';
            } else if (patientType === 'caregiver') {
                explanation += 'ご不明な点があれば、お気軽にご相談ください。';
            } else {
                explanation += 'ご不明な点があれば、いつでもご相談ください。';
            }
            
            return explanation;
        }
        
        function generateDetailedInfo(drugInfo, patientType) {
            let info = '';
            
            info += '■より詳しい情報\n';
            info += 'このお薬は、症状に合わせて医師が処方しています。\n';
            info += '効果が感じられるまで時間がかかる場合があります。\n';
            info += '自分の判断で飲むのをやめないでください。\n\n';
            
            return info;
        }
        
        function copyResult() {
            const resultContent = document.getElementById('resultContent').innerText;
            navigator.clipboard.writeText(resultContent).then(() => {
                const btn = document.querySelector('.copy-btn');
                const originalText = btn.textContent;
                btn.textContent = '✓ コピーしました';
                btn.style.background = '#28a745';
                setTimeout(() => {
                    btn.textContent = originalText;
                }, 2000);
            }).catch(err => {
                alert('コピーに失敗しました。手動でコピーしてください。');
            });
        }
    </script>
